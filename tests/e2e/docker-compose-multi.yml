x-pinchtab-base: &pinchtab-base
  # All pinchtab variants share the same image — only the pinchtab service
  # carries `build:` so compose builds it once. The 6 variants differ only
  # by config file and command flags, supplied via volumes/env at runtime.
  image: e2e-pinchtab:latest
  pull_policy: never
  shm_size: '2gb'

x-pinchtab-healthcheck: &pinchtab-healthcheck
  test: ["CMD-SHELL", "wget --header='Authorization: Bearer e2e-token' -q -O /dev/null http://localhost:9999/health"]
  interval: 1s
  timeout: 10s
  retries: 30
  start_period: 5s

services:
  pinchtab:
    <<: *pinchtab-base
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      PINCHTAB_CONFIG: /data/e2e-config/pinchtab.json
    volumes:
      - ./config/pinchtab.json:/fixture-config/pinchtab.json:ro
      - ./fixtures/test-extension:/extensions/test-extension
      - ./fixtures/test-extension-api:/extensions/test-extension-api
    command: ["/bin/sh", "-lc", "mkdir -p /data/e2e-config && cp /fixture-config/pinchtab.json /data/e2e-config/pinchtab.json && exec /usr/local/bin/docker-entrypoint.sh pinchtab"]
    ports:
      - "127.0.0.1:9999:9999"
    healthcheck: *pinchtab-healthcheck

  pinchtab-secure:
    <<: *pinchtab-base
    environment:
      PINCHTAB_CONFIG: /data/e2e-config/pinchtab-secure.json
    volumes:
      - ./config/pinchtab-secure.json:/fixture-config/pinchtab-secure.json:ro
    command: ["/bin/sh", "-lc", "mkdir -p /data/e2e-config && cp /fixture-config/pinchtab-secure.json /data/e2e-config/pinchtab-secure.json && exec /usr/local/bin/docker-entrypoint.sh pinchtab"]
    ports:
      - "127.0.0.1:9998:9999"
    healthcheck: *pinchtab-healthcheck

  pinchtab-autoclose:
    <<: *pinchtab-base
    environment:
      PINCHTAB_CONFIG: /data/e2e-config/pinchtab-autoclose.json
    volumes:
      - ./config/pinchtab-autoclose.json:/fixture-config/pinchtab-autoclose.json:ro
      - ./fixtures/test-extension:/extensions/test-extension
    command: ["/bin/sh", "-lc", "mkdir -p /data/e2e-config && cp /fixture-config/pinchtab-autoclose.json /data/e2e-config/pinchtab-autoclose.json && exec /usr/local/bin/docker-entrypoint.sh pinchtab"]
    healthcheck: *pinchtab-healthcheck

  pinchtab-medium:
    <<: *pinchtab-base
    environment:
      PINCHTAB_CONFIG: /data/e2e-config/pinchtab-medium-permissive.json
    volumes:
      - ./config/pinchtab-medium-permissive.json:/fixture-config/pinchtab-medium-permissive.json:ro
      - ./fixtures/test-extension:/extensions/test-extension
    command: ["/bin/sh", "-lc", "mkdir -p /data/e2e-config && cp /fixture-config/pinchtab-medium-permissive.json /data/e2e-config/pinchtab-medium-permissive.json && exec /usr/local/bin/docker-entrypoint.sh pinchtab"]
    ports:
      - "127.0.0.1:9994:9999"
    healthcheck: *pinchtab-healthcheck

  pinchtab-full:
    <<: *pinchtab-base
    environment:
      PINCHTAB_CONFIG: /data/e2e-config/pinchtab-full-permissive.json
    volumes:
      - ./config/pinchtab-full-permissive.json:/fixture-config/pinchtab-full-permissive.json:ro
      - ./fixtures/test-extension:/extensions/test-extension
    command: ["/bin/sh", "-lc", "mkdir -p /data/e2e-config && cp /fixture-config/pinchtab-full-permissive.json /data/e2e-config/pinchtab-full-permissive.json && exec /usr/local/bin/docker-entrypoint.sh pinchtab"]
    ports:
      - "127.0.0.1:9995:9999"
    healthcheck: *pinchtab-healthcheck

  pinchtab-lite:
    <<: *pinchtab-base
    environment:
      PINCHTAB_CONFIG: /data/e2e-config/pinchtab-lite.json
    volumes:
      - ./config/pinchtab-lite.json:/fixture-config/pinchtab-lite.json:ro
    ports:
      - "127.0.0.1:9997:9999"
    command: ["/bin/sh", "-lc", "mkdir -p /data/e2e-config && cp /fixture-config/pinchtab-lite.json /data/e2e-config/pinchtab-lite.json && exec /usr/local/bin/docker-entrypoint.sh pinchtab bridge"]
    healthcheck: *pinchtab-healthcheck

  pinchtab-bridge:
    <<: *pinchtab-base
    environment:
      PINCHTAB_CONFIG: /data/e2e-config/pinchtab-bridge.json
    volumes:
      - ./config/pinchtab-bridge.json:/fixture-config/pinchtab-bridge.json:ro
    ports:
      - "127.0.0.1:9996:9999"
    command: ["/bin/sh", "-lc", "mkdir -p /data/e2e-config && cp /fixture-config/pinchtab-bridge.json /data/e2e-config/pinchtab-bridge.json && exec /usr/local/bin/docker-entrypoint.sh pinchtab bridge"]
    healthcheck:
      # Bridge-mode pinchtab uses a different auth token. Same tightened
      # cadence as the shared healthcheck anchor above.
      test: ["CMD-SHELL", "wget --header='Authorization: Bearer e2e-bridge-token' -q -O /dev/null http://localhost:9999/health"]
      interval: 1s
      timeout: 10s
      retries: 30
      start_period: 5s

  fixtures:
    # Custom image: nginx + baked-in default.conf with httpbin-compatible
    # /redirect/N, /redirect-to, and /get endpoints. Baking the config in
    # avoids bind-mount races where the new conf doesn't get picked up on
    # `docker compose up` without a forced recreate.
    build:
      context: ./nginx
    volumes:
      - ./fixtures:/usr/share/nginx/html:ro
    networks:
      default:
        # Second hostname that points at the same nginx. Used by IDPI
        # same-tab pivot tests: the page navigates from `fixtures` (in the
        # IDPI allowlist) to `pivot-target` (not in the allowlist) to
        # simulate a cross-domain pivot while staying fully offline.
        aliases:
          - fixtures
          - pivot-target
    healthcheck:
      # Verify BOTH that nginx is up AND that the custom config is the one
      # actually loaded. /get is a synthetic endpoint defined only in
      # tests/e2e/nginx/default.conf — if it returns 200 we know the baked
      # config is live; if it 404s the container stays unhealthy and the
      # test runner refuses to start, which surfaces "stale image / config
      # not loaded" failures up front instead of as opaque test errors.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:80/ && wget -q -O /dev/null http://localhost:80/get"]
      interval: 1s
      timeout: 5s
      retries: 10

  runner-api:
    build:
      context: ./runner-api
    depends_on:
      pinchtab:
        condition: service_healthy
      pinchtab-secure:
        condition: service_healthy
      pinchtab-autoclose:
        condition: service_healthy
      pinchtab-medium:
        condition: service_healthy
      pinchtab-full:
        condition: service_healthy
      pinchtab-lite:
        condition: service_healthy
      pinchtab-bridge:
        condition: service_healthy
      fixtures:
        condition: service_healthy
    environment:
      - E2E_SERVER=http://pinchtab:9999
      - E2E_SECURE_SERVER=http://pinchtab-secure:9999
      - E2E_AUTOCLOSE_SERVER=http://pinchtab-autoclose:9999
      - E2E_MEDIUM_SERVER=http://pinchtab-medium:9999
      - E2E_FULL_SERVER=http://pinchtab-full:9999
      - E2E_LITE_SERVER=http://pinchtab-lite:9999
      - E2E_SERVER_TOKEN=e2e-token
      - E2E_BRIDGE_URL=http://pinchtab-bridge:9999
      - E2E_BRIDGE_TOKEN=e2e-bridge-token
      - FIXTURES_URL=http://fixtures:80
      - STEALTH_MATRIX
    volumes:
      - ./:/e2e:ro
      - ./results:/results

  runner-cli:
    # Same role as runner-cli in docker-compose.yml. The Go runner overrides
    # the executor command for each suite.
    build:
      context: ../..
      dockerfile: tests/e2e/runner-cli/Dockerfile
    depends_on:
      pinchtab:
        condition: service_healthy
      fixtures:
        condition: service_healthy
    environment:
      - E2E_SERVER=http://pinchtab:9999
      - E2E_SERVER_TOKEN=e2e-token
      - FIXTURES_URL=http://fixtures:80
    volumes:
      - ./:/e2e:ro
      - ./results:/results
