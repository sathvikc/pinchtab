name: Reusable / E2E

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      suite:
        required: true
        type: string
      summary_title:
        required: true
        type: string
      timeout_minutes:
        required: true
        type: number
      extra_scenarios:
        required: false
        type: string
        default: ''
    outputs:
      status:
        value: ${{ jobs.run.outputs.status }}
      passed:
        value: ${{ jobs.run.outputs.passed }}
      failed:
        value: ${{ jobs.run.outputs.failed }}
      tests:
        value: ${{ jobs.run.outputs.tests }}
      suites:
        value: ${{ jobs.run.outputs.suites }}
      test_time:
        value: ${{ jobs.run.outputs.test_time }}
      test_time_ms:
        value: ${{ jobs.run.outputs.test_time_ms }}
      overall_wall_time:
        value: ${{ jobs.run.outputs.overall_wall_time }}
      overall_wall_time_ms:
        value: ${{ jobs.run.outputs.overall_wall_time_ms }}
      failures:
        value: ${{ jobs.run.outputs.failures }}


permissions:
  contents: read

jobs:
  run:
    name: ${{ inputs.summary_title }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    outputs:
      status: ${{ steps.e2e.outputs.status }}
      passed: ${{ steps.e2e.outputs.passed }}
      failed: ${{ steps.e2e.outputs.failed }}
      tests: ${{ steps.e2e.outputs.tests }}
      suites: ${{ steps.e2e.outputs.suites }}
      test_time: ${{ steps.e2e.outputs.test_time }}
      test_time_ms: ${{ steps.e2e.outputs.test_time_ms }}
      overall_wall_time: ${{ steps.e2e.outputs.overall_wall_time }}
      overall_wall_time_ms: ${{ steps.e2e.outputs.overall_wall_time_ms }}
      failures: ${{ steps.e2e.outputs.failures }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install E2E runtime deps
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq coreutils curl

      - name: E2E tool diagnostics
        shell: bash
        run: |
          set -euo pipefail
          echo "suite=${{ inputs.suite }}"
          for tool in bash docker jq awk sed grep find sort tee head; do
            if command -v "$tool" >/dev/null 2>&1; then
              echo "[ok] $tool: $(command -v "$tool")"
            else
              echo "[missing] $tool"
            fi
          done
          docker --version || true
          docker compose version || docker-compose version || true
          jq --version || true

      - name: Run E2E suite
        id: e2e
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tests/e2e/results
          rm -f tests/e2e/results/summary*.txt tests/e2e/results/report*.md tests/e2e/results/output*.log

          EXTRA="${{ inputs.extra_scenarios }}"
          args=(e2e --suite "${{ inputs.suite }}" --logs hide)
          if [ -n "$EXTRA" ]; then
            args+=(--extra "$EXTRA")
          fi
          go run ./tests/tools/runner "${args[@]}"
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-results-${{ inputs.suite }}
          path: |
            tests/e2e/results/
          if-no-files-found: warn
          retention-days: 7
